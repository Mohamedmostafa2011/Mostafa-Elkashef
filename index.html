<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Mostafa Elkashef | IG Math</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css" />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { dark: '#0f172a', primary: '#2563eb', light: '#eff6ff', accent: '#f59e0b' } },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .spinner { border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 2px solid #fff; width: 16px; height: 16px; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .iti { width: 100%; }
        .iti__tel-input { background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 0.5rem; font-size: 0.875rem; width: 100%; height: 50px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen overflow-hidden">

    <div id="toast-container" class="fixed top-6 right-6 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <!-- ================= AUTH SCREEN ================= -->
    <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900">
        <div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-2xl relative overflow-hidden fade-in mx-4">
            
            <!-- TABS -->
            <div class="flex border-b border-slate-100 mb-6">
                <button onclick="switchTab('login')" id="tab-login" class="flex-1 pb-3 text-sm font-bold text-brand-primary border-b-2 border-brand-primary transition">Login</button>
                <button onclick="switchTab('signup')" id="tab-signup" class="flex-1 pb-3 text-sm font-bold text-slate-400 hover:text-slate-600 transition">Create Account</button>
            </div>

            <!-- HEADER -->
            <div class="text-center mb-6">
                <div class="w-14 h-14 bg-blue-50 text-brand-primary rounded-2xl flex items-center justify-center text-2xl mx-auto mb-3 shadow-lg">
                    <i class="fas fa-square-root-variable"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-900" id="auth-title">Welcome Back</h1>
            </div>

            <!-- 1. LOGIN FORM -->
            <div id="login-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase mb-1 ml-1">Mobile Number</label>
                    <input type="tel" id="login-phone">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase mb-1 ml-1">Password</label>
                    <input type="password" id="login-pass" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:border-brand-primary outline-none" placeholder="••••••••">
                </div>
                <button id="btn-login" class="w-full bg-brand-primary text-white font-bold py-3.5 rounded-xl hover:bg-blue-700 transition shadow-lg mt-2">
                    Log In
                </button>
            </div>

            <!-- 2. SIGN UP FORM (NO SMS - Direct Creation) -->
            <div id="signup-form" class="space-y-4 hidden">
                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase mb-1 ml-1">Full Name</label>
                    <input type="text" id="reg-name" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none" placeholder="e.g. Ahmed Ali">
                </div>
                <div class="mt-4">
                    <label class="block text-xs font-bold text-slate-600 uppercase mb-1 ml-1">Mobile Number</label>
                    <input type="tel" id="reg-phone">
                </div>
                <div class="mt-4">
                    <label class="block text-xs font-bold text-slate-600 uppercase mb-1 ml-1">Create Password</label>
                    <input type="password" id="reg-pass" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none" placeholder="••••••••">
                </div>
                <button id="btn-create-account" class="w-full bg-green-600 text-white font-bold py-3.5 rounded-xl hover:bg-green-700 transition shadow-lg mt-4">
                    Create Account
                </button>
                <p class="text-[10px] text-slate-400 text-center mt-2">Account requires Admin approval.</p>
            </div>

            <!-- Admin Hint -->
            <div class="mt-6 pt-4 border-t border-slate-100 text-center text-[10px] text-slate-400">
                Admin Login: <b>+1 1234567890</b> | Pass: <b>admin123</b>
            </div>
        </div>
    </div>

    <!-- ================= PENDING SCREEN ================= -->
    <div id="pending-screen" class="fixed inset-0 z-40 flex flex-col items-center justify-center bg-slate-50 hidden text-center p-6">
        <div class="w-24 h-24 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center text-4xl mb-6 shadow-xl">
            <i class="fas fa-user-clock"></i>
        </div>
        <h1 class="text-2xl font-bold text-slate-900 mb-2">Approval Pending</h1>
        <p class="text-slate-500 max-w-md mb-8">
            Your account has been created successfully!<br>
            Please contact <b>Mr. Mostafa</b> to activate your access.
        </p>
        <button onclick="location.reload()" class="bg-white border border-slate-300 text-slate-700 font-bold py-2 px-6 rounded-lg hover:bg-slate-50">Refresh Status</button>
        <button id="logout-pending" class="text-red-500 text-sm font-bold mt-4 block mx-auto">Log Out</button>
    </div>

    <!-- ================= APP SCREEN ================= -->
    <div id="app-screen" class="hidden flex h-screen w-full relative">
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-white border-r border-slate-200 transform -translate-x-full md:translate-x-0 transition-transform duration-300 z-40 flex flex-col shadow-xl md:shadow-none">
            <div class="h-16 flex items-center px-6 border-b border-slate-100 gap-3">
                <div class="w-8 h-8 bg-brand-primary text-white rounded flex items-center justify-center font-bold"><i class="fas fa-calculator"></i></div>
                <span class="font-bold text-slate-900 tracking-tight">IG Math Pro</span>
                <button id="close-sidebar" class="md:hidden ml-auto text-slate-400"><i class="fas fa-times"></i></button>
            </div>
            <nav id="nav-links" class="flex-1 p-4 space-y-1"></nav>
            <div class="p-4 border-t border-slate-100">
                <button id="logout-btn" class="w-full flex items-center justify-center gap-2 text-slate-500 hover:text-red-600 text-sm font-medium py-2 transition">
                    <i class="fas fa-sign-out-alt"></i> Log Out
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col md:ml-64 min-w-0">
            <header class="h-16 bg-white/80 backdrop-blur border-b border-slate-200 flex items-center justify-between px-4 md:px-8 sticky top-0 z-30">
                <div class="flex items-center gap-3">
                    <button id="open-sidebar" class="md:hidden p-2 text-slate-600 hover:bg-slate-100 rounded-lg"><i class="fas fa-bars"></i></button>
                    <h2 class="text-lg font-bold text-slate-800">Overview</h2>
                </div>
                <div class="flex items-center gap-4">
                    <div class="text-right hidden sm:block">
                        <p id="header-user" class="text-sm font-bold text-slate-900">...</p>
                        <p id="header-role" class="text-xs text-slate-500">...</p>
                    </div>
                </div>
            </header>
            <div id="main-view" class="flex-1 overflow-y-auto p-4 md:p-8 relative"></div>
        </main>
        <div id="mobile-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden backdrop-blur-sm"></div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, getDoc, doc, setDoc, query, where, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyBSO1WWLoQkWgtpGGhHV6MCegePEErijO0",
            authDomain: "mostafa-elkashef.firebaseapp.com",
            projectId: "mostafa-elkashef",
            storageBucket: "mostafa-elkashef.firebasestorage.app",
            messagingSenderId: "1029862762774",
            appId: "1:1029862762774:web:b8852c7e0be74b1ca88837"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- PHONE INPUTS ---
        const loginPhoneInput = window.intlTelInput(document.querySelector("#login-phone"), {
            initialCountry: "eg", preferredCountries: ["eg", "sa", "ae"], separateDialCode: true, utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js"
        });
        const regPhoneInput = window.intlTelInput(document.querySelector("#reg-phone"), {
            initialCountry: "eg", preferredCountries: ["eg", "sa", "ae"], separateDialCode: true, utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js"
        });

        // --- STATE ---
        let currentUserData = null;

        // --- TAB SWITCHER ---
        window.switchTab = (tab) => {
            const title = document.getElementById('auth-title');
            if(tab === 'login') {
                document.getElementById('login-form').classList.remove('hidden');
                document.getElementById('signup-form').classList.add('hidden');
                document.getElementById('tab-login').className = "flex-1 pb-3 text-sm font-bold text-brand-primary border-b-2 border-brand-primary transition";
                document.getElementById('tab-signup').className = "flex-1 pb-3 text-sm font-bold text-slate-400 hover:text-slate-600 transition";
                title.innerText = "Welcome Back";
            } else {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('signup-form').classList.remove('hidden');
                document.getElementById('tab-signup').className = "flex-1 pb-3 text-sm font-bold text-brand-primary border-b-2 border-brand-primary transition";
                document.getElementById('tab-login').className = "flex-1 pb-3 text-sm font-bold text-slate-400 hover:text-slate-600 transition";
                title.innerText = "Create Account";
            }
        };

        // --- 1. LOGIN LOGIC ---
        document.getElementById('btn-login').addEventListener('click', async () => {
            const pass = document.getElementById('login-pass').value;
            if(!loginPhoneInput.isValidNumber()) return showToast("Invalid Phone Number", "error");
            if(!pass) return showToast("Password Required", "error");

            const phone = loginPhoneInput.getNumber();
            // Trick: We convert phone to email behind the scenes to avoid SMS costs
            // Firebase doesn't like '+', so we remove it for the email string
            const fakeEmail = phone.replace('+', '') + "@igmath.com"; 

            const btn = document.getElementById('btn-login');
            btn.innerHTML = `<span class="spinner border-white w-5 h-5"></span>`;
            btn.disabled = true;

            try {
                await signInWithEmailAndPassword(auth, fakeEmail, pass);
                showToast("Logged In Successfully");
            } catch (error) {
                console.error(error);
                showToast("Invalid Phone or Password", "error");
                btn.innerHTML = "Log In";
                btn.disabled = false;
            }
        });

        // --- 2. SIGN UP LOGIC (No SMS - Unlimited) ---
        document.getElementById('btn-create-account').addEventListener('click', async () => {
            const name = document.getElementById('reg-name').value;
            const pass = document.getElementById('reg-pass').value;
            
            if(!name) return showToast("Name required", "error");
            if(!regPhoneInput.isValidNumber()) return showToast("Invalid Phone Number", "error");
            if(!pass || pass.length < 6) return showToast("Password must be 6+ chars", "error");

            const phone = regPhoneInput.getNumber();
            const fakeEmail = phone.replace('+', '') + "@igmath.com"; 

            const btn = document.getElementById('btn-create-account');
            btn.innerHTML = `<span class="spinner border-white w-5 h-5"></span> Creating...`;
            btn.disabled = true;

            try {
                // Create User in Firebase Auth (Uses Email/Pass for Free Tier)
                const cred = await createUserWithEmailAndPassword(auth, fakeEmail, pass);
                
                // Check Admin (Hardcoded Test Number)
                const isAdmin = phone === '+11234567890';

                // Save User Data
                await setDoc(doc(db, "users", cred.user.uid), {
                    name: name,
                    phone: phone, // Store real phone
                    role: isAdmin ? 'admin' : 'student',
                    status: isAdmin ? 'approved' : 'pending',
                    uid: cred.user.uid,
                    createdAt: new Date().toISOString()
                });

                showToast("Account Created!");
                // Auth Observer will handle redirection to Pending Screen
            } catch (error) {
                let msg = error.message;
                if(error.code === 'auth/email-already-in-use') msg = "Phone number already registered.";
                showToast(msg, "error");
                btn.innerHTML = "Create Account";
                btn.disabled = false;
            }
        });

        // --- AUTH OBSERVER ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                
                try {
                    const docSnap = await getDoc(doc(db, "users", user.uid));
                    if(docSnap.exists()) {
                        currentUserData = docSnap.data();
                        
                        // CHECK APPROVAL STATUS
                        if(currentUserData.status === 'pending') {
                            document.getElementById('pending-screen').classList.remove('hidden');
                            document.getElementById('app-screen').classList.add('hidden');
                        } else {
                            document.getElementById('pending-screen').classList.add('hidden');
                            document.getElementById('app-screen').classList.remove('hidden');
                            
                            document.getElementById('header-user').innerText = currentUserData.name;
                            document.getElementById('header-role').innerText = currentUserData.role === 'admin' ? 'Instructor' : 'Student';
                            
                            if(currentUserData.role === 'admin') renderAdminView();
                            else renderStudentView();
                        }
                    }
                } catch (e) { console.error(e); }
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
                document.getElementById('pending-screen').classList.add('hidden');
                
                document.getElementById('btn-login').innerHTML = "Log In";
                document.getElementById('btn-login').disabled = false;
                document.getElementById('btn-create-account').innerHTML = "Create Account";
                document.getElementById('btn-create-account').disabled = false;
            }
        });

        // --- VIEWS ---
        function renderAdminView() {
            const nav = document.getElementById('nav-links');
            nav.innerHTML = `
                <button onclick="renderApprovals()" class="nav-item w-full flex items-center gap-3 px-4 py-3 bg-brand-light text-brand-primary rounded-xl font-medium transition">
                    <i class="fas fa-users"></i> Approvals
                </button>`;
            renderApprovals();
        }

        window.renderApprovals = async function() {
            const q = query(collection(db, "users"), where("status", "==", "pending"));
            const snap = await getDocs(q);
            let html = `<div class="p-6"><h2 class="text-2xl font-bold mb-4">Pending Approvals (${snap.size})</h2><div class="space-y-3">`;
            if(snap.empty) html += `<p class="text-slate-400">No requests.</p>`;
            snap.forEach(doc => {
                const u = doc.data();
                html += `<div class="bg-white p-4 rounded-xl border border-slate-200 flex justify-between items-center shadow-sm"><div><h4 class="font-bold text-slate-800">${u.name}</h4><p class="text-sm text-slate-500">${u.phone}</p></div><div class="flex gap-2"><button onclick="approveUser('${u.uid}')" class="bg-green-600 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-green-700">Approve</button><button onclick="deleteUser('${u.uid}')" class="bg-red-50 text-red-500 px-4 py-2 rounded-lg text-xs font-bold hover:bg-red-100">Reject</button></div></div>`;
            });
            html += `</div></div>`;
            document.getElementById('main-view').innerHTML = html;
        }

        window.approveUser = async (uid) => {
            if(!confirm("Approve access?")) return;
            await updateDoc(doc(db, "users", uid), { status: 'approved' });
            showToast("Approved!"); renderApprovals();
        }

        function renderStudentView() {
            document.getElementById('nav-links').innerHTML = `<button class="nav-item w-full flex items-center gap-3 px-4 py-3 bg-brand-light text-brand-primary rounded-xl font-medium"><i class="fas fa-home"></i> Dashboard</button>`;
            document.getElementById('main-view').innerHTML = `<div class="p-10 text-center"><h2 class="text-2xl font-bold text-slate-800">Welcome, ${currentUserData.name}</h2><p class="text-slate-500 mt-2">You have full access.</p></div>`;
        }

        // UTILS
        document.getElementById('logout-btn').onclick = () => signOut(auth);
        document.getElementById('logout-pending').onclick = () => signOut(auth);
        function showToast(msg, type = 'success') {
            const c = document.getElementById('toast-container');
            const el = document.createElement('div');
            el.className = `${type === 'error' ? 'bg-red-500' : 'bg-emerald-600'} text-white px-4 py-3 rounded-lg shadow-xl flex items-center gap-3 text-sm font-bold min-w-[280px] fade-in`;
            el.innerHTML = `<i class="fas ${type === 'error' ? 'fa-times' : 'fa-check'}"></i> ${msg}`;
            c.appendChild(el); setTimeout(() => el.remove(), 4000);
        }
        const sb = document.getElementById('sidebar'); const ov = document.getElementById('mobile-overlay');
        document.getElementById('open-sidebar').onclick = () => { sb.classList.remove('-translate-x-full'); ov.classList.remove('hidden'); };
        document.getElementById('close-sidebar').onclick = () => { sb.classList.add('-translate-x-full'); ov.classList.add('hidden'); };
        document.getElementById('mobile-overlay').onclick = () => { sb.classList.add('-translate-x-full'); ov.classList.add('hidden'); };

    </script>
</body>
</html>
