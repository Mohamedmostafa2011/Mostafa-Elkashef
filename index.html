<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Mostafa Elkashef | IG Math</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css" />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        brand: { dark: '#0f172a', primary: '#2563eb', secondary: '#4f46e5', accent: '#f59e0b' },
                        surface: '#f8fafc',
                        glass: 'rgba(255, 255, 255, 0.9)'
                    },
                    fontFamily: { 
                        sans: ['Outfit', 'sans-serif'], 
                        mono: ['JetBrains Mono', 'monospace'] 
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
        
        /* --- MATH PATTERNS --- */
        .bg-grid-pattern {
            background-image: linear-gradient(to right, rgba(0,0,0,0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 24px 24px;
        }
        
        /* --- CARD STYLES --- */
        .course-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .course-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        
        /* Phone Input Fixes */
        .iti { width: 100%; }
        .iti__tel-input { background-color: #ffffff; border: 1px solid #e2e8f0; border-radius: 0.75rem; height: 52px; }
        
        /* Tabs */
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; background: #eff6ff; }
    </style>
</head>
<body class="bg-surface text-slate-800 h-screen overflow-hidden selection:bg-brand-primary selection:text-white">

    <div id="toast-container" class="fixed top-6 right-6 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <!-- AUTH SCREEN (UNCHANGED) -->
    <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900">
        <div class="bg-white w-full max-w-md p-8 rounded-[2rem] shadow-2xl relative overflow-hidden fade-in mx-4 max-h-[95vh] overflow-y-auto">
            <div class="flex p-1 bg-slate-100 rounded-xl mb-8">
                <button onclick="switchTab('login')" id="tab-login" class="flex-1 py-2.5 text-sm font-bold rounded-lg shadow-sm bg-white text-brand-primary transition-all">Login</button>
                <button onclick="switchTab('signup')" id="tab-signup" class="flex-1 py-2.5 text-sm font-bold rounded-lg text-slate-500 hover:text-slate-700 transition-all">Sign Up</button>
            </div>
            <div class="text-center mb-8"><h1 class="text-2xl font-bold text-slate-900" id="auth-title">Welcome Back</h1></div>
            <div id="login-form" class="space-y-5">
                <input type="tel" id="login-phone">
                <input type="password" id="login-pass" class="w-full px-4 py-3.5 bg-white border border-slate-200 rounded-xl text-sm outline-none" placeholder="Password">
                <button id="btn-login" class="w-full bg-brand-primary text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition shadow-xl">Log In</button>
            </div>
            <div id="signup-form" class="space-y-5 hidden">
                <input type="text" id="reg-name" class="w-full px-4 py-3.5 bg-white border border-slate-200 rounded-xl text-sm outline-none" placeholder="Full Name">
                <div class="relative">
                    <select id="reg-course" class="w-full px-4 py-3.5 bg-white border border-slate-200 rounded-xl text-sm font-bold text-slate-700 outline-none"><option value="" disabled selected>Loading...</option></select>
                </div>
                <div id="course-code-field" class="hidden bg-amber-50 p-4 rounded-xl border border-amber-100">
                    <label class="text-xs font-bold text-amber-600 uppercase mb-1 block">Group Code</label>
                    <input type="text" id="reg-code" class="w-full px-4 py-2.5 bg-white border border-amber-200 rounded-lg text-sm font-bold uppercase tracking-widest">
                </div>
                <input type="tel" id="reg-phone">
                <input type="password" id="reg-pass" class="w-full px-4 py-3.5 bg-white border border-slate-200 rounded-xl text-sm outline-none" placeholder="Password">
                <button id="btn-create-account" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl hover:bg-slate-800 transition shadow-xl">Create Account</button>
            </div>
        </div>
    </div>

    <!-- PENDING SCREEN (UNCHANGED) -->
    <div id="pending-screen" class="fixed inset-0 z-40 flex flex-col items-center justify-center bg-slate-50 hidden text-center p-6">
        <h1 class="text-3xl font-bold text-slate-900 mb-2">Approval Pending</h1>
        <p class="text-slate-500 mb-8">Contact Mr. Mostafa to activate your account.</p>
        <div class="flex gap-3">
            <button onclick="location.reload()" class="bg-brand-primary text-white px-6 py-2.5 rounded-lg font-bold">Refresh</button>
            <button id="logout-pending" class="text-red-500 font-bold text-sm">Log Out</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-screen" class="hidden flex h-screen w-full relative bg-surface">
        
        <!-- SIDEBAR -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-white border-r border-slate-200 transform -translate-x-full md:translate-x-0 transition-transform duration-300 z-40 flex flex-col shadow-2xl md:shadow-none">
            <div class="h-20 flex items-center px-6 gap-3 border-b border-slate-50">
                <div class="w-10 h-10 bg-brand-primary text-white rounded-xl flex items-center justify-center font-bold text-lg"><i class="fas fa-cube"></i></div>
                <span class="font-bold text-slate-900 tracking-tight">IG Math Pro</span>
                <button id="close-sidebar" class="md:hidden ml-auto text-slate-400"><i class="fas fa-times"></i></button>
            </div>
            <nav id="nav-links" class="flex-1 p-4 space-y-1 overflow-y-auto"></nav>
            <div class="p-4 border-t border-slate-50"><button id="logout-btn" class="w-full text-slate-500 hover:text-red-600 font-bold py-2 text-sm">Log Out</button></div>
        </aside>

        <main class="flex-1 flex flex-col md:ml-72 min-w-0">
            <header class="h-20 bg-white/80 backdrop-blur border-b border-slate-200 flex items-center justify-between px-6 sticky top-0 z-30">
                <button id="open-sidebar" class="md:hidden p-2 text-slate-600"><i class="fas fa-bars text-xl"></i></button>
                <div class="ml-auto flex items-center gap-4">
                    <div class="text-right hidden sm:block">
                        <p id="header-user" class="text-sm font-bold text-slate-900">...</p>
                        <p id="header-role" class="text-xs text-slate-500">...</p>
                    </div>
                </div>
            </header>
            
            <!-- DYNAMIC CONTENT AREA -->
            <div id="main-view" class="flex-1 overflow-y-auto p-6 md:p-10 bg-slate-50 bg-grid-pattern relative">
                <!-- Views injected here -->
            </div>
        </main>
        <div id="mobile-overlay" class="fixed inset-0 bg-slate-900/50 z-30 hidden md:hidden backdrop-blur-sm"></div>
    </div>

    <!-- COURSE MODAL (UNCHANGED) -->
    <div id="course-modal" class="fixed inset-0 z-[60] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm hidden fade-in p-4">
        <div class="bg-white w-full max-w-lg rounded-3xl overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-xl font-bold text-slate-900" id="modal-title">Create Course</h3>
                <button onclick="toggleCourseModal()" class="w-8 h-8 rounded-full bg-white border border-slate-200 flex items-center justify-center text-slate-400 hover:text-red-500"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-6 space-y-5">
                <input type="hidden" id="edit-course-id">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase">Course Title</label>
                    <input type="text" id="new-course-title" class="w-full mt-1 p-3.5 bg-white border border-slate-200 rounded-xl text-sm font-bold outline-none focus:border-brand-primary" placeholder="e.g. Calculus 101">
                </div>
                <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                    <label class="text-xs font-bold text-brand-primary uppercase block mb-2">Subcourses (Optional)</label>
                    <div id="subcourse-container" class="space-y-2 max-h-40 overflow-y-auto"></div>
                </div>
                <div class="flex gap-3">
                    <button onclick="saveNewCourse()" class="flex-1 bg-brand-dark text-white font-bold py-3.5 rounded-xl hover:bg-slate-800 shadow-lg">Save Course</button>
                    <button onclick="deleteCourse()" id="btn-delete-course" class="hidden px-4 bg-red-50 border border-red-100 text-red-500 font-bold rounded-xl"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, getDoc, doc, setDoc, query, where, updateDoc, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBSO1WWLoQkWgtpGGhHV6MCegePEErijO0",
            authDomain: "mostafa-elkashef.firebaseapp.com",
            projectId: "mostafa-elkashef",
            storageBucket: "mostafa-elkashef.firebasestorage.app",
            messagingSenderId: "1029862762774",
            appId: "1:1029862762774:web:b8852c7e0be74b1ca88837"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const itiConfig = { initialCountry: "eg", preferredCountries: ["eg", "sa", "ae"], utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js", separateDialCode: true };
        const loginPhone = window.intlTelInput(document.querySelector("#login-phone"), itiConfig);
        const regPhone = window.intlTelInput(document.querySelector("#reg-phone"), itiConfig);

        let currentUserData = null;
        let availableCourses = [];
        let activeCourseContext = null; // Stores {courseId, subcode, title}

        // --- AUTH LOGIC (Same as before) ---
        window.switchTab = async (tab) => {
            if(tab === 'login') {
                document.getElementById('login-form').classList.remove('hidden');
                document.getElementById('signup-form').classList.add('hidden');
                document.getElementById('auth-title').innerText = "Welcome Back";
            } else {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('signup-form').classList.remove('hidden');
                document.getElementById('auth-title').innerText = "Join Class";
                await loadCoursesForSignup();
            }
        };

        async function loadCoursesForSignup() {
            const select = document.getElementById('reg-course');
            const snap = await getDocs(query(collection(db, "courses"), orderBy("createdAt")));
            select.innerHTML = '<option value="" disabled selected>Select Your Course</option>';
            availableCourses = [];
            snap.forEach(d => {
                availableCourses.push({id: d.id, ...d.data()});
                const opt = document.createElement('option'); opt.value = d.id; opt.innerText = d.data().title; select.appendChild(opt);
            });
        }

        document.getElementById('reg-course').addEventListener('change', (e) => {
            const course = availableCourses.find(c => c.id === e.target.value);
            if(course && course.subcourses && course.subcourses.length > 0) document.getElementById('course-code-field').classList.remove('hidden');
            else { document.getElementById('course-code-field').classList.add('hidden'); document.getElementById('reg-code').value = ""; }
        });

        document.getElementById('btn-login').onclick = async () => {
            const pass = document.getElementById('login-pass').value;
            if(!loginPhone.isValidNumber()) return showToast("Invalid Phone", "error");
            try { await signInWithEmailAndPassword(auth, loginPhone.getNumber().replace('+','')+"@igmath.com", pass); } catch(e) { showToast("Login Failed", "error"); }
        };

        document.getElementById('btn-create-account').onclick = async () => {
            const name = document.getElementById('reg-name').value;
            const pass = document.getElementById('reg-pass').value;
            const courseId = document.getElementById('reg-course').value;
            if(!name || !pass || !courseId) return showToast("All fields required", "error");
            
            const course = availableCourses.find(c => c.id === courseId);
            let subcourseCode = null;
            if(course && course.subcourses && course.subcourses.length > 0) {
                const code = document.getElementById('reg-code').value.trim().toUpperCase();
                if(!course.subcourses.includes(code)) return showToast("Invalid Group Code", "error");
                subcourseCode = code;
            }

            const phone = regPhone.getNumber();
            const email = phone.replace('+', '') + "@igmath.com";
            const isAdmin = phone === '+11234567890';

            try {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                await setDoc(doc(db, "users", cred.user.uid), {
                    name, phone, role: isAdmin?'admin':'student', status: isAdmin?'approved':'pending', courseId, subcourseCode, uid: cred.user.uid, createdAt: new Date().toISOString()
                });
                showToast("Account Created!");
            } catch(e) { showToast(e.message, "error"); }
        };

        onAuthStateChanged(auth, async (user) => {
            if(user) {
                document.getElementById('auth-screen').classList.add('hidden');
                const snap = await getDoc(doc(db, "users", user.uid));
                if(snap.exists()) {
                    currentUserData = snap.data();
                    if(currentUserData.status === 'pending') document.getElementById('pending-screen').classList.remove('hidden');
                    else {
                        document.getElementById('app-screen').classList.remove('hidden');
                        document.getElementById('header-user').innerText = currentUserData.name;
                        document.getElementById('header-role').innerText = currentUserData.role === 'admin' ? 'Instructor' : 'Student';
                        if(currentUserData.role === 'admin') renderAdminHome();
                        else renderStudentDashboard();
                    }
                }
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
                document.getElementById('pending-screen').classList.add('hidden');
            }
        });

        // --- ADMIN HOME (THE GRID) ---
        window.renderAdminHome = async () => {
            document.getElementById('nav-links').innerHTML = `
                <button onclick="renderAdminHome()" class="nav-item w-full flex items-center gap-3 px-4 py-3 bg-brand-light text-brand-primary rounded-xl font-bold text-sm"><i class="fas fa-th-large"></i> Courses</button>
                <button onclick="renderApprovals()" class="nav-item w-full flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-xl font-medium text-sm"><i class="fas fa-user-check"></i> Approvals</button>
            `;

            const container = document.getElementById('main-view');
            // Sort: CreatedAt ASC (Oldest First)
            const snap = await getDocs(query(collection(db, "courses"), orderBy("createdAt", "asc")));
            
            let html = `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 fade-in">
                    <!-- ADD NEW CARD -->
                    <div onclick="openModalForCreate()" class="border-2 border-dashed border-slate-300 rounded-[2rem] h-64 flex flex-col items-center justify-center cursor-pointer hover:border-brand-primary hover:bg-blue-50/50 transition group">
                        <div class="w-16 h-16 bg-white rounded-full shadow-sm flex items-center justify-center mb-4 group-hover:scale-110 transition"><i class="fas fa-plus text-2xl text-brand-primary"></i></div>
                        <h3 class="font-bold text-slate-500 group-hover:text-brand-primary">Create New Course</h3>
                    </div>
            `;

            const mathIcons = ['fa-square-root-variable', 'fa-calculator', 'fa-infinity', 'fa-chart-pie', 'fa-superscript'];

            snap.forEach((doc, index) => {
                const c = doc.data();
                const icon = mathIcons[index % mathIcons.length];
                const safeCourse = encodeURIComponent(JSON.stringify({id: doc.id, ...c}));
                
                html += `
                    <div class="course-card relative h-64 rounded-[2rem] overflow-hidden shadow-lg p-6 flex flex-col justify-between cursor-pointer text-white" style="background: ${c.theme}" onclick="handleCardClick('${doc.id}', ${c.subcourses ? c.subcourses.length : 0})">
                        <!-- Settings (Z-Index Higher) -->
                        <button onclick="openModalForEdit('${safeCourse}', event)" class="absolute top-4 right-4 w-8 h-8 bg-white/20 hover:bg-white text-white hover:text-brand-dark rounded-full flex items-center justify-center backdrop-blur transition z-20"><i class="fas fa-cog"></i></button>
                        
                        <!-- Decoration -->
                        <div class="absolute -right-6 -bottom-10 opacity-20 text-[120px]"><i class="fas ${icon}"></i></div>
                        
                        <div class="relative z-10">
                            ${c.subcourses && c.subcourses.length > 0 ? `<span class="bg-white/20 backdrop-blur px-3 py-1 rounded-full text-[10px] font-bold uppercase border border-white/30">${c.subcourses.length} Groups</span>` : '<span class="opacity-0">.</span>'}
                            <h3 class="text-3xl font-bold mt-4 leading-tight drop-shadow-md">${c.title}</h3>
                        </div>
                        
                        <div class="relative z-10 flex items-center gap-2">
                            <div class="w-10 h-10 bg-white text-brand-primary rounded-full flex items-center justify-center shadow-lg"><i class="fas fa-arrow-right"></i></div>
                            <span class="text-sm font-medium opacity-90">Enter Course</span>
                        </div>
                    </div>
                `;
            });
            html += `</div>`;
            container.innerHTML = html;
        };

        // --- INTERMEDIATE: SELECT SUBGROUP ---
        window.handleCardClick = async (courseId, subCount) => {
            if(subCount > 0) {
                const snap = await getDoc(doc(db, "courses", courseId));
                const course = snap.data();
                const container = document.getElementById('main-view');
                
                let html = `
                    <button onclick="renderAdminHome()" class="mb-6 flex items-center gap-2 text-slate-500 hover:text-brand-primary font-bold transition"><i class="fas fa-arrow-left"></i> Back</button>
                    <h2 class="text-3xl font-bold text-slate-900 mb-2">Select Group</h2>
                    <p class="text-slate-500 mb-8">Managing <b>${course.title}</b></p>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 fade-in">`;
                
                course.subcourses.forEach(code => {
                    html += `
                        <div onclick="openCourseDashboard('${courseId}', '${course.title}', '${code}')" class="bg-white border border-slate-200 p-8 rounded-2xl shadow-sm hover:shadow-lg hover:border-brand-primary cursor-pointer transition text-center group">
                            <div class="text-3xl font-bold text-slate-800 group-hover:text-brand-primary mb-2">${code}</div>
                            <span class="text-xs text-slate-400 font-bold uppercase tracking-widest">Class Group</span>
                        </div>`;
                });
                html += `</div>`;
                container.innerHTML = html;
            } else {
                const snap = await getDoc(doc(db, "courses", courseId));
                openCourseDashboard(courseId, snap.data().title, null);
            }
        };

        // --- THE "NEW PAGE" COURSE DASHBOARD ---
        window.openCourseDashboard = (id, title, subcode) => {
            activeCourseContext = { id, title, subcode };
            
            // Sidebar Nav Update
            const subLabel = subcode ? `(${subcode})` : '';
            document.getElementById('nav-links').innerHTML = `
                <button onclick="renderAdminHome()" class="nav-item w-full flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-xl font-bold text-sm mb-4"><i class="fas fa-arrow-left"></i> Back to Hub</button>
                
                <div class="px-4 mb-2 text-xs font-bold text-slate-400 uppercase tracking-wider">Course Menu</div>
                <button onclick="renderTab('home')" class="nav-item course-tab w-full flex items-center gap-3 px-4 py-3 bg-brand-light text-brand-primary rounded-xl font-bold text-sm mb-1"><i class="fas fa-bullhorn w-5 text-center"></i> Home</button>
                <button onclick="renderTab('videos')" class="nav-item course-tab w-full flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl font-medium text-sm mb-1"><i class="fas fa-video w-5 text-center"></i> Recorded Videos</button>
                <button onclick="renderTab('summaries')" class="nav-item course-tab w-full flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl font-medium text-sm mb-1"><i class="fas fa-file-alt w-5 text-center"></i> Summaries</button>
                <button onclick="renderTab('hw')" class="nav-item course-tab w-full flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl font-medium text-sm"><i class="fas fa-pencil-alt w-5 text-center"></i> Homework</button>
            `;

            renderTab('home'); // Load default
        };

        window.renderTab = (tabName) => {
            // Update Sidebar Active State
            document.querySelectorAll('.course-tab').forEach(btn => {
                btn.className = "nav-item course-tab w-full flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 rounded-xl font-medium text-sm mb-1";
            });
            // Find the button that calls this tab (simple hack)
            const clickedBtn = Array.from(document.querySelectorAll('.course-tab')).find(b => b.getAttribute('onclick').includes(tabName));
            if(clickedBtn) clickedBtn.className = "nav-item course-tab w-full flex items-center gap-3 px-4 py-3 bg-brand-light text-brand-primary rounded-xl font-bold text-sm mb-1";

            const container = document.getElementById('main-view');
            const { title, subcode } = activeCourseContext;
            const header = `
                <div class="mb-8 border-b border-slate-200 pb-6">
                    <h1 class="text-3xl font-bold text-slate-900">${title} <span class="text-brand-primary">${subcode ? subcode : ''}</span></h1>
                    <p class="text-slate-500">Managing content for this group.</p>
                </div>`;

            if (tabName === 'home') {
                container.innerHTML = `
                    ${header}
                    <div class="bg-white rounded-2xl p-8 shadow-sm border border-slate-100 text-center fade-in">
                        <div class="inline-block p-4 bg-amber-50 text-amber-500 rounded-full text-2xl mb-4"><i class="fas fa-bullhorn"></i></div>
                        <h2 class="text-xl font-bold text-slate-800">Announcements</h2>
                        <p class="text-slate-500 mb-6">Post updates for your students here.</p>
                        <button class="bg-brand-dark text-white px-6 py-3 rounded-xl font-bold text-sm">New Announcement</button>
                    </div>`;
            } else if (tabName === 'videos') {
                container.innerHTML = `
                    ${header}
                    <div class="flex justify-between items-center mb-6 fade-in">
                        <h2 class="text-xl font-bold text-slate-800">Recorded Videos</h2>
                        <button class="bg-brand-primary text-white px-4 py-2 rounded-lg font-bold text-sm"><i class="fas fa-plus mr-2"></i> Upload Video</button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="bg-white rounded-xl overflow-hidden border border-slate-200 shadow-sm">
                            <div class="h-32 bg-slate-200 flex items-center justify-center text-slate-400"><i class="fas fa-play-circle text-3xl"></i></div>
                            <div class="p-4"><h3 class="font-bold text-slate-800 text-sm">Introduction to Algebra</h3><p class="text-xs text-slate-500">45 mins</p></div>
                        </div>
                    </div>`;
            } else if (tabName === 'summaries') {
                container.innerHTML = `
                    ${header}
                    <div class="bg-white rounded-2xl p-8 shadow-sm border border-slate-100 text-center fade-in">
                        <div class="inline-block p-4 bg-green-50 text-green-500 rounded-full text-2xl mb-4"><i class="fas fa-file-pdf"></i></div>
                        <h2 class="text-xl font-bold text-slate-800">Video Summaries / Notes</h2>
                        <button class="mt-4 bg-brand-dark text-white px-6 py-3 rounded-xl font-bold text-sm">Upload PDF</button>
                    </div>`;
            } else if (tabName === 'hw') {
                container.innerHTML = `
                    ${header}
                    <div class="bg-white rounded-2xl p-8 shadow-sm border border-slate-100 text-center fade-in">
                        <div class="inline-block p-4 bg-purple-50 text-purple-500 rounded-full text-2xl mb-4"><i class="fas fa-pencil-alt"></i></div>
                        <h2 class="text-xl font-bold text-slate-800">Homework Assignments</h2>
                        <button class="mt-4 bg-brand-primary text-white px-6 py-3 rounded-xl font-bold text-sm">Create Assignment</button>
                    </div>`;
            }
        };

        // --- COURSE SETTINGS (EDIT/DELETE) ---
        window.toggleCourseModal = () => document.getElementById('course-modal').classList.toggle('hidden');
        
        window.openModalForCreate = () => {
            document.getElementById('modal-title').innerText = "Create New Course";
            document.getElementById('edit-course-id').value = "";
            document.getElementById('new-course-title').value = "";
            document.getElementById('btn-delete-course').classList.add('hidden');
            setupSubcourseInputs(['']); 
            document.getElementById('course-modal').classList.remove('hidden');
        };

        window.openModalForEdit = (courseStr, e) => {
            e.stopPropagation();
            const course = JSON.parse(decodeURIComponent(courseStr));
            document.getElementById('modal-title').innerText = "Edit Course";
            document.getElementById('edit-course-id').value = course.id;
            document.getElementById('new-course-title').value = course.title;
            document.getElementById('btn-delete-course').classList.remove('hidden');
            let subs = course.subcourses || [];
            if(subs.length === 0 || subs[subs.length-1] !== '') subs.push('');
            setupSubcourseInputs(subs);
            document.getElementById('course-modal').classList.remove('hidden');
        };

        function setupSubcourseInputs(codes) {
            const container = document.getElementById('subcourse-container');
            container.innerHTML = '';
            const createInput = (val) => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-2 mb-2 fade-in";
                div.innerHTML = `<input type="text" value="${val}" class="subcourse-input flex-1 p-3 bg-white border border-blue-200 rounded-lg text-sm font-mono outline-none focus:border-brand-primary uppercase" placeholder="Code (e.g. 10A)">
                    ${val ? `<button class="text-red-400 hover:text-red-600 px-2"><i class="fas fa-trash"></i></button>` : ''}`;
                const btn = div.querySelector('button'); if(btn) btn.onclick = () => div.remove();
                const input = div.querySelector('input');
                input.addEventListener('input', (e) => {
                    const all = container.querySelectorAll('input');
                    if (e.target === all[all.length-1] && e.target.value.trim() !== "") container.appendChild(createInput(''));
                });
                return div;
            };
            codes.forEach(c => container.appendChild(createInput(c)));
        }

        window.handleSaveCourse = async () => {
            const title = document.getElementById('new-course-title').value;
            const id = document.getElementById('edit-course-id').value;
            if(!title) return showToast("Title required", "error");
            const subs = [];
            document.querySelectorAll('.subcourse-input').forEach(i => { if(i.value.trim()) subs.push(i.value.trim().toUpperCase()); });

            try {
                if(id) {
                    await updateDoc(doc(db, "courses", id), { title, subcourses: subs });
                    showToast("Updated");
                } else {
                    const themes = [
                        'linear-gradient(135deg, #1e293b, #334155)', // Dark Slate
                        'linear-gradient(135deg, #1e40af, #3b82f6)', // Royal Blue
                        'linear-gradient(135deg, #0f766e, #10b981)', // Teal
                        'linear-gradient(135deg, #b91c1c, #ef4444)', // Red
                        'linear-gradient(135deg, #7c3aed, #8b5cf6)'  // Violet
                    ];
                    const theme = themes[Math.floor(Math.random() * themes.length)];
                    await addDoc(collection(db, "courses"), { title, subcourses: subs, theme, createdAt: new Date().toISOString() });
                    showToast("Created");
                }
                toggleCourseModal(); renderAdminHome();
            } catch(e) { showToast("Error", "error"); }
        };

        window.handleDeleteCourse = async () => {
            if(!confirm("Delete?")) return;
            await deleteDoc(doc(db, "courses", document.getElementById('edit-course-id').value));
            toggleCourseModal(); renderAdminHome(); showToast("Deleted");
        };

        // --- UTILS & TOAST ---
        function showToast(msg, type='success'){
            const el = document.createElement('div'); el.className = `${type==='error'?'bg-red-500':'bg-green-600'} text-white px-6 py-3.5 rounded-xl shadow-2xl font-bold fade-in z-[100]`; el.innerHTML = msg;
            document.getElementById('toast-container').appendChild(el); setTimeout(() => el.remove(), 4000);
        }
        document.getElementById('logout-btn').onclick = () => signOut(auth);
        document.getElementById('logout-pending').onclick = () => signOut(auth);
        document.getElementById('open-sidebar').onclick = () => { document.getElementById('sidebar').classList.remove('-translate-x-full'); document.getElementById('mobile-overlay').classList.remove('hidden'); };
        document.getElementById('close-sidebar').onclick = () => { document.getElementById('sidebar').classList.add('-translate-x-full'); document.getElementById('mobile-overlay').classList.add('hidden'); };
        document.getElementById('mobile-overlay').onclick = () => { document.getElementById('sidebar').classList.add('-translate-x-full'); document.getElementById('mobile-overlay').classList.add('hidden'); };
    </script>
</body>
</html>
