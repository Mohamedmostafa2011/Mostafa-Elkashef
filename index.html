<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Mostafa Elkashef | IG Math</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css" />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        brand: { dark: '#0f172a', primary: '#2563eb', light: '#eff6ff', accent: '#f59e0b' },
                        surface: '#f8fafc'
                    },
                    fontFamily: { 
                        sans: ['Plus Jakarta Sans', 'sans-serif'], 
                        display: ['Outfit', 'sans-serif'] 
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .font-display { font-family: 'Outfit', sans-serif; }
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
        
        .iti { width: 100%; display: block; }
        .iti__tel-input { background-color: #ffffff; border: 1px solid #e2e8f0; border-radius: 0.75rem; font-size: 0.875rem; width: 100%; height: 52px; padding-left: 90px !important; }
        
        .bg-math-grid { background-image: radial-gradient(rgba(255,255,255,0.2) 1px, transparent 1px); background-size: 20px 20px; }
        .card-glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body class="bg-surface text-slate-800 h-screen overflow-hidden">

    <div id="toast-container" class="fixed top-6 right-6 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900">
        <div class="absolute inset-0 opacity-10" style="background-image: url('https://www.transparenttextures.com/patterns/cubes.png');"></div>
        <div class="bg-white w-full max-w-md p-8 rounded-[2rem] shadow-2xl relative overflow-hidden fade-in mx-4 max-h-[95vh] overflow-y-auto">
            <!-- (Auth UI Same as before - simplified for brevity) -->
            <div class="flex p-1 bg-slate-100 rounded-xl mb-8">
                <button onclick="switchTab('login')" id="tab-login" class="flex-1 py-2.5 text-sm font-bold rounded-lg shadow-sm bg-white text-brand-primary transition-all">Login</button>
                <button onclick="switchTab('signup')" id="tab-signup" class="flex-1 py-2.5 text-sm font-bold rounded-lg text-slate-500 hover:text-slate-700 transition-all">Sign Up</button>
            </div>
            <div class="text-center mb-8"><h1 class="text-2xl font-display font-bold text-slate-900" id="auth-title">Welcome Back</h1></div>
            <div id="login-form" class="space-y-5">
                <input type="tel" id="login-phone">
                <input type="password" id="login-pass" class="w-full px-4 py-3.5 bg-white border border-slate-200 rounded-xl text-sm outline-none focus:border-brand-primary" placeholder="Password">
                <button id="btn-login" class="w-full bg-brand-primary text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition shadow-xl">Log In</button>
            </div>
            <div id="signup-form" class="space-y-5 hidden">
                <input type="text" id="reg-name" class="w-full px-4 py-3.5 bg-white border border-slate-200 rounded-xl text-sm outline-none" placeholder="Full Name">
                <div class="relative">
                    <select id="reg-course" class="w-full px-4 py-3.5 bg-white border border-slate-200 rounded-xl text-sm font-bold text-slate-700 outline-none appearance-none"><option value="" disabled selected>Loading Courses...</option></select>
                    <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-slate-500"><i class="fas fa-chevron-down text-xs"></i></div>
                </div>
                <div id="course-code-field" class="hidden bg-amber-50 p-4 rounded-xl border border-amber-100">
                    <label class="text-xs font-bold text-amber-600 uppercase mb-1 block">Subcourse Code</label>
                    <input type="text" id="reg-code" class="w-full px-4 py-2.5 bg-white border border-amber-200 rounded-lg text-sm font-bold uppercase tracking-widest" placeholder="e.g. 10A">
                </div>
                <input type="tel" id="reg-phone">
                <input type="password" id="reg-pass" class="w-full px-4 py-3.5 bg-white border border-slate-200 rounded-xl text-sm outline-none" placeholder="Create Password">
                <button id="btn-create-account" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl hover:bg-slate-800 transition shadow-xl">Create Account</button>
            </div>
        </div>
    </div>

    <!-- PENDING SCREEN -->
    <div id="pending-screen" class="fixed inset-0 z-40 flex flex-col items-center justify-center bg-slate-50 hidden text-center p-6">
        <h1 class="text-3xl font-display font-bold text-slate-900 mb-2">Approval Pending</h1>
        <p class="text-slate-500 mb-8">Contact Mr. Mostafa to activate your account.</p>
        <div class="flex gap-3">
            <button onclick="location.reload()" class="bg-brand-primary text-white px-6 py-2.5 rounded-lg font-bold">Refresh</button>
            <button id="logout-pending" class="bg-white border border-slate-200 text-red-500 px-6 py-2.5 rounded-lg font-bold">Log Out</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-screen" class="hidden flex h-screen w-full relative">
        <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-white border-r border-slate-200 transform -translate-x-full md:translate-x-0 transition-transform duration-300 z-40 flex flex-col shadow-2xl md:shadow-none">
            <div class="h-20 flex items-center px-6 gap-3 border-b border-slate-50">
                <div class="w-10 h-10 bg-brand-primary text-white rounded-xl flex items-center justify-center font-bold text-lg"><i class="fas fa-cube"></i></div>
                <span class="font-display font-bold text-slate-900 tracking-tight">IG Math Pro</span>
                <button id="close-sidebar" class="md:hidden ml-auto text-slate-400"><i class="fas fa-times"></i></button>
            </div>
            <nav id="nav-links" class="flex-1 p-4 space-y-1 overflow-y-auto"></nav>
            <div class="p-4 border-t border-slate-50"><button id="logout-btn" class="w-full text-slate-500 hover:text-red-600 font-bold py-2 text-sm">Log Out</button></div>
        </aside>

        <main class="flex-1 flex flex-col md:ml-72 min-w-0 bg-surface">
            <header class="h-20 bg-white/80 backdrop-blur border-b border-slate-200 flex items-center justify-between px-6 sticky top-0 z-30">
                <button id="open-sidebar" class="md:hidden p-2 text-slate-600"><i class="fas fa-bars text-xl"></i></button>
                <div class="ml-auto flex items-center gap-4">
                    <div class="text-right hidden sm:block">
                        <p id="header-user" class="text-sm font-bold text-slate-900">...</p>
                        <p id="header-role" class="text-xs text-slate-500">...</p>
                    </div>
                </div>
            </header>
            <div id="main-view" class="flex-1 overflow-y-auto p-6 md:p-10"></div>
        </main>
        <div id="mobile-overlay" class="fixed inset-0 bg-slate-900/50 z-30 hidden md:hidden backdrop-blur-sm"></div>
    </div>

    <!-- EDIT/CREATE COURSE MODAL -->
    <div id="course-modal" class="fixed inset-0 z-[60] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm hidden fade-in p-4">
        <div class="bg-white w-full max-w-lg rounded-3xl overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <h3 class="text-xl font-display font-bold text-slate-900" id="modal-title">Create New Course</h3>
                <button onclick="toggleCourseModal()" class="w-8 h-8 rounded-full bg-white border border-slate-200 flex items-center justify-center text-slate-400 hover:text-red-500"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-6 space-y-5">
                <input type="hidden" id="edit-course-id"> <!-- Stores ID if editing -->
                
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Course Title</label>
                    <input type="text" id="course-title-input" class="w-full mt-1 p-3.5 bg-white border border-slate-200 rounded-xl text-sm font-bold outline-none focus:border-brand-primary focus:ring-2 focus:ring-brand-light" placeholder="e.g. IGCSE Year 10">
                </div>
                
                <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                    <label class="text-xs font-bold text-brand-primary uppercase tracking-wider block mb-2">Subcourses (Codes)</label>
                    <div id="subcourse-container" class="space-y-2 max-h-40 overflow-y-auto pr-2"></div>
                </div>

                <div class="flex gap-3">
                    <button onclick="handleSaveCourse()" class="flex-1 bg-brand-dark text-white font-bold py-3.5 rounded-xl hover:bg-slate-800 transition shadow-lg">Save Changes</button>
                    <button onclick="handleDeleteCourse()" id="btn-delete-course" class="hidden px-4 bg-red-50 text-red-500 font-bold rounded-xl hover:bg-red-100 transition"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, getDoc, doc, setDoc, query, where, updateDoc, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBSO1WWLoQkWgtpGGhHV6MCegePEErijO0",
            authDomain: "mostafa-elkashef.firebaseapp.com",
            projectId: "mostafa-elkashef",
            storageBucket: "mostafa-elkashef.firebasestorage.app",
            messagingSenderId: "1029862762774",
            appId: "1:1029862762774:web:b8852c7e0be74b1ca88837"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- PHONE INPUTS ---
        const itiConfig = { initialCountry: "eg", preferredCountries: ["eg", "sa", "ae"], utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js", separateDialCode: true };
        const loginPhone = window.intlTelInput(document.querySelector("#login-phone"), itiConfig);
        const regPhone = window.intlTelInput(document.querySelector("#reg-phone"), itiConfig);

        let currentUserData = null;
        let availableCourses = [];

        // --- AUTH ---
        window.switchTab = async (tab) => {
            if(tab === 'login') {
                document.getElementById('login-form').classList.remove('hidden');
                document.getElementById('signup-form').classList.add('hidden');
                document.getElementById('auth-title').innerText = "Welcome Back";
            } else {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('signup-form').classList.remove('hidden');
                document.getElementById('auth-title').innerText = "Join Class";
                await loadCoursesForSignup();
            }
        };

        async function loadCoursesForSignup() {
            const select = document.getElementById('reg-course');
            const snap = await getDocs(query(collection(db, "courses"), orderBy("createdAt")));
            select.innerHTML = '<option value="" disabled selected>Select Your Course</option>';
            availableCourses = [];
            snap.forEach(d => {
                const c = { id: d.id, ...d.data() };
                availableCourses.push(c);
                const opt = document.createElement('option'); opt.value = d.id; opt.innerText = c.title; select.appendChild(opt);
            });
        }

        document.getElementById('reg-course').addEventListener('change', (e) => {
            const course = availableCourses.find(c => c.id === e.target.value);
            const codeField = document.getElementById('course-code-field');
            if(course && course.subcourses && course.subcourses.length > 0) codeField.classList.remove('hidden');
            else { codeField.classList.add('hidden'); document.getElementById('reg-code').value = ""; }
        });

        document.getElementById('btn-login').onclick = async () => {
            const pass = document.getElementById('login-pass').value;
            if(!loginPhone.isValidNumber()) return showToast("Invalid Phone", "error");
            const email = loginPhone.getNumber().replace('+', '') + "@igmath.com";
            try { await signInWithEmailAndPassword(auth, email, pass); } catch(e) { showToast("Login Failed", "error"); }
        };

        document.getElementById('btn-create-account').onclick = async () => {
            const name = document.getElementById('reg-name').value;
            const pass = document.getElementById('reg-pass').value;
            const courseId = document.getElementById('reg-course').value;
            if(!name || !pass || !courseId) return showToast("Missing Fields", "error");
            
            const course = availableCourses.find(c => c.id === courseId);
            let subcourseCode = null;
            if(course && course.subcourses.length > 0) {
                subcourseCode = document.getElementById('reg-code').value.trim().toUpperCase();
                if(!course.subcourses.includes(subcourseCode)) return showToast("Invalid Group Code", "error");
            }

            const phone = regPhone.getNumber();
            const email = phone.replace('+', '') + "@igmath.com";
            const isAdmin = phone === '+11234567890';

            try {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                await setDoc(doc(db, "users", cred.user.uid), {
                    name, phone, role: isAdmin?'admin':'student', status: isAdmin?'approved':'pending', courseId, subcourseCode, uid: cred.user.uid, createdAt: new Date().toISOString()
                });
                showToast("Account Created!");
            } catch(e) { showToast(e.message, "error"); }
        };

        onAuthStateChanged(auth, async (user) => {
            if(user) {
                document.getElementById('auth-screen').classList.add('hidden');
                const snap = await getDoc(doc(db, "users", user.uid));
                if(snap.exists()) {
                    currentUserData = snap.data();
                    if(currentUserData.status === 'pending') document.getElementById('pending-screen').classList.remove('hidden');
                    else {
                        document.getElementById('app-screen').classList.remove('hidden');
                        document.getElementById('header-user').innerText = currentUserData.name;
                        document.getElementById('header-role').innerText = currentUserData.role === 'admin' ? 'Instructor' : 'Student';
                        if(currentUserData.role === 'admin') renderAdminCourses();
                        else renderStudentDashboard();
                    }
                }
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
                document.getElementById('pending-screen').classList.add('hidden');
            }
        });

        // --- ADMIN: COURSE LOGIC ---
        window.renderAdminCourses = async () => {
            document.getElementById('nav-links').innerHTML = `<button onclick="renderAdminCourses()" class="nav-item w-full flex items-center gap-3 px-4 py-3 bg-brand-light text-brand-primary rounded-xl font-bold text-sm"><i class="fas fa-layer-group"></i> Courses</button><button onclick="renderApprovals()" class="nav-item w-full flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-xl font-medium text-sm"><i class="fas fa-users"></i> Approvals</button>`;
            const container = document.getElementById('main-view');
            container.innerHTML = '<div class="flex justify-center h-64 items-center"><span class="spinner border-slate-300 border-t-brand-primary w-8 h-8"></span></div>';

            const snap = await getDocs(query(collection(db, "courses"), orderBy("createdAt", "desc")));
            let html = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 fade-in">
                <div onclick="openModalForCreate()" class="border-2 border-dashed border-slate-300 rounded-[2rem] h-64 flex flex-col items-center justify-center cursor-pointer hover:border-brand-primary hover:bg-blue-50/50 transition group">
                    <div class="w-16 h-16 bg-white rounded-full shadow-sm flex items-center justify-center mb-4 group-hover:scale-110 transition"><i class="fas fa-plus text-2xl text-brand-primary"></i></div>
                    <h3 class="font-bold text-slate-500 group-hover:text-brand-primary">Create New Course</h3>
                </div>`;

            snap.forEach(doc => {
                const c = doc.data();
                // Stringify data to pass to function
                const courseData = JSON.stringify({ id: doc.id, ...c }).replace(/"/g, '&quot;');
                
                html += `
                    <div class="relative h-64 rounded-[2rem] overflow-hidden shadow-lg hover:shadow-2xl transition hover:scale-[1.02] text-white p-6 flex flex-col justify-between group" style="background: ${c.theme}">
                        <div class="absolute inset-0 bg-math-grid opacity-20"></div>
                        
                        <!-- Settings Button -->
                        <button onclick="openModalForEdit(${courseData}, event)" class="absolute top-4 right-4 w-8 h-8 bg-white/20 hover:bg-white text-white hover:text-brand-dark rounded-full flex items-center justify-center backdrop-blur transition z-20">
                            <i class="fas fa-cog"></i>
                        </button>

                        <!-- Main Click Area -->
                        <div class="absolute inset-0 z-10" onclick="enterCourseLogic('${doc.id}', ${c.subcourses ? c.subcourses.length : 0})"></div>

                        <div class="relative z-0 mt-4">
                            ${c.subcourses && c.subcourses.length > 0 ? `<span class="bg-white/20 backdrop-blur px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest border border-white/30">${c.subcourses.length} Groups</span>` : ''}
                            <h3 class="text-3xl font-display font-bold leading-tight mt-3 drop-shadow-md">${c.title}</h3>
                        </div>
                        <div class="relative z-0 flex justify-between items-end pointer-events-none">
                            <p class="font-mono text-lg opacity-90">#${doc.id.substring(0,4).toUpperCase()}</p>
                            <div class="w-12 h-12 bg-white text-brand-primary rounded-full flex items-center justify-center shadow-lg group-hover:rotate-45 transition duration-300"><i class="fas fa-arrow-right"></i></div>
                        </div>
                    </div>`;
            });
            html += `</div>`;
            container.innerHTML = html;
        };

        // --- NAVIGATION LOGIC (Step 2) ---
        window.enterCourseLogic = async (courseId, subCount) => {
            if(subCount > 0) {
                // Show Subcourse Selector
                const snap = await getDoc(doc(db, "courses", courseId));
                const course = snap.data();
                const container = document.getElementById('main-view');
                
                let html = `
                    <button onclick="renderAdminCourses()" class="mb-6 flex items-center gap-2 text-slate-500 hover:text-brand-primary font-bold transition"><i class="fas fa-arrow-left"></i> Back to Courses</button>
                    <h2 class="text-3xl font-display font-bold text-slate-900 mb-2">Select Group</h2>
                    <p class="text-slate-500 mb-8">Which dashboard do you want to manage for <b>${course.title}</b>?</p>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 fade-in">`;
                
                course.subcourses.forEach(code => {
                    html += `
                        <div onclick="renderCourseDashboard('${courseId}', '${course.title}', '${code}')" class="bg-white border border-slate-200 p-6 rounded-2xl shadow-sm hover:shadow-md hover:border-brand-primary cursor-pointer transition text-center group">
                            <div class="text-2xl font-bold text-slate-800 group-hover:text-brand-primary mb-1">${code}</div>
                            <span class="text-xs text-slate-400 uppercase tracking-wider font-bold">Group</span>
                        </div>`;
                });
                html += `</div>`;
                container.innerHTML = html;
            } else {
                // Go Direct
                const snap = await getDoc(doc(db, "courses", courseId));
                renderCourseDashboard(courseId, snap.data().title, null);
            }
        };

        window.renderCourseDashboard = (id, title, subcode) => {
            const container = document.getElementById('main-view');
            const subTitle = subcode ? `Group ${subcode}` : 'Main Group';
            container.innerHTML = `
                <button onclick="renderAdminCourses()" class="mb-6 flex items-center gap-2 text-slate-500 hover:text-brand-primary font-bold transition"><i class="fas fa-arrow-left"></i> Back</button>
                <div class="bg-white rounded-[2rem] p-8 shadow-xl border border-slate-100 text-center">
                    <div class="inline-block p-4 bg-blue-50 rounded-full text-brand-primary mb-4 text-3xl"><i class="fas fa-chalkboard-user"></i></div>
                    <h1 class="text-4xl font-display font-bold text-slate-900 mb-2">${title}</h1>
                    <div class="inline-block bg-slate-100 px-4 py-1 rounded-full text-sm font-bold text-slate-600">${subTitle} Dashboard</div>
                    <p class="mt-6 text-slate-500 max-w-lg mx-auto">This is the dedicated content area for <b>${title} ${subcode ? '('+subcode+')' : ''}</b>. Here you will upload videos and homework specifically for these students.</p>
                </div>
            `;
        };

        // --- MODAL & EDITING ---
        window.openModalForCreate = () => {
            document.getElementById('modal-title').innerText = "Create New Course";
            document.getElementById('edit-course-id').value = "";
            document.getElementById('new-course-title').value = "";
            document.getElementById('btn-delete-course').classList.add('hidden');
            setupSubcourseInputs([]); 
            document.getElementById('course-modal').classList.remove('hidden');
        };

        window.openModalForEdit = (course, e) => {
            e.stopPropagation(); // Stop card click
            document.getElementById('modal-title').innerText = "Edit Course";
            document.getElementById('edit-course-id').value = course.id;
            document.getElementById('new-course-title').value = course.title;
            document.getElementById('btn-delete-course').classList.remove('hidden');
            setupSubcourseInputs(course.subcourses || []);
            document.getElementById('course-modal').classList.remove('hidden');
        };

        window.toggleCourseModal = () => document.getElementById('course-modal').classList.add('hidden');

        function setupSubcourseInputs(existingCodes) {
            const container = document.getElementById('subcourse-container');
            container.innerHTML = '';
            
            // Helper to create row
            const createRow = (val = '') => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-2 mb-2";
                div.innerHTML = `
                    <input type="text" class="subcourse-input flex-1 p-3 bg-white border border-blue-200 rounded-lg text-sm font-mono outline-none focus:border-brand-primary uppercase" placeholder="Code (e.g. 10A)" value="${val}">
                    ${val ? `<button onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-600 px-2"><i class="fas fa-trash"></i></button>` : ''}
                `;
                return div;
            };

            existingCodes.forEach(code => container.appendChild(createRow(code)));
            container.appendChild(createRow('')); // Empty slot at end

            // Dynamic Add
            container.addEventListener('input', () => {
                const inputs = container.querySelectorAll('input');
                if(inputs[inputs.length-1].value.trim() !== '') container.appendChild(createRow(''));
            });
        }

        window.handleSaveCourse = async () => {
            const id = document.getElementById('edit-course-id').value;
            const title = document.getElementById('new-course-title').value;
            const subs = [];
            document.querySelectorAll('.subcourse-input').forEach(i => { if(i.value.trim()) subs.push(i.value.trim().toUpperCase()); });

            if(!title) return showToast("Title required", "error");

            if(id) {
                // Update
                await updateDoc(doc(db, "courses", id), { title, subcourses: subs });
                showToast("Course Updated");
            } else {
                // Create
                const gradients = ['linear-gradient(135deg, #3b82f6, #8b5cf6)', 'linear-gradient(135deg, #10b981, #0ea5e9)', 'linear-gradient(135deg, #f59e0b, #ef4444)', 'linear-gradient(135deg, #6366f1, #d946ef)', 'linear-gradient(135deg, #0f172a, #334155)'];
                const theme = gradients[Math.floor(Math.random() * gradients.length)];
                await addDoc(collection(db, "courses"), { title, subcourses: subs, theme, createdAt: new Date().toISOString() });
                showToast("Course Created");
            }
            window.toggleCourseModal();
            renderAdminCourses();
        };

        window.handleDeleteCourse = async () => {
            if(!confirm("Delete this course permanently?")) return;
            const id = document.getElementById('edit-course-id').value;
            await deleteDoc(doc(db, "courses", id));
            window.toggleCourseModal();
            renderAdminCourses();
            showToast("Course Deleted");
        };

        // --- ADMIN APPROVALS ---
        window.renderApprovals = async () => {
            document.getElementById('nav-links').children[0].className = "nav-item w-full flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-xl font-medium text-sm transition";
            document.getElementById('nav-links').children[1].className = "nav-item w-full flex items-center gap-3 px-4 py-3 bg-brand-light text-brand-primary rounded-xl font-bold text-sm transition";
            
            const snap = await getDocs(query(collection(db, "users"), where("status", "==", "pending")));
            let html = `<div class="max-w-4xl mx-auto"><h2 class="text-2xl font-bold mb-6 text-slate-800">Requests</h2><div class="space-y-4">`;
            if(snap.empty) html += `<p class="text-slate-400">No pending requests.</p>`;
            snap.forEach(d => {
                const u = d.data();
                html += `<div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex justify-between items-center"><div><h4 class="font-bold text-slate-900">${u.name}</h4><p class="text-xs text-slate-500 font-mono">${u.phone}</p>${u.subcourseCode ? `<span class="text-[10px] bg-amber-100 text-amber-700 px-2 rounded">Code: ${u.subcourseCode}</span>` : ''}</div><button onclick="approveUser('${d.id}')" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-xl text-sm font-bold">Approve</button></div>`;
            });
            html += `</div></div>`;
            document.getElementById('main-view').innerHTML = html;
        };

        window.approveUser = async (uid) => {
            await updateDoc(doc(db, "users", uid), { status: 'approved' });
            showToast("Approved"); renderApprovals();
        };

        // --- STUDENT VIEW ---
        window.renderStudentDashboard = async () => {
            const cSnap = await getDoc(doc(db, "courses", currentUserData.courseId));
            const title = cSnap.exists() ? cSnap.data().title : "Unknown";
            document.getElementById('main-view').innerHTML = `<div class="p-8 text-center"><h2 class="text-3xl font-display font-bold text-slate-900">Welcome, ${currentUserData.name}</h2><div class="inline-block bg-blue-100 text-brand-primary px-4 py-1 rounded-full text-sm font-bold mt-2">${title} ${currentUserData.subcourseCode ? '('+currentUserData.subcourseCode+')' : ''}</div><p class="text-slate-500 mt-6">Content coming soon.</p></div>`;
        };

        function showToast(msg, type='success'){
            const el = document.createElement('div'); el.className = `${type==='error'?'bg-red-500':'bg-green-600'} text-white px-6 py-3.5 rounded-xl shadow-2xl flex items-center gap-3 text-sm font-bold min-w-[300px] fade-in z-[100]`; el.innerHTML = msg;
            document.getElementById('toast-container').appendChild(el); setTimeout(() => el.remove(), 4000);
        }
        document.getElementById('logout-btn').onclick = () => signOut(auth);
        document.getElementById('logout-pending').onclick = () => signOut(auth);
        document.getElementById('open-sidebar').onclick = () => { document.getElementById('sidebar').classList.remove('-translate-x-full'); document.getElementById('mobile-overlay').classList.remove('hidden'); };
        document.getElementById('close-sidebar').onclick = () => { document.getElementById('sidebar').classList.add('-translate-x-full'); document.getElementById('mobile-overlay').classList.add('hidden'); };
        document.getElementById('mobile-overlay').onclick = () => { document.getElementById('sidebar').classList.add('-translate-x-full'); document.getElementById('mobile-overlay').classList.add('hidden'); };
    </script>
</body>
</html>
